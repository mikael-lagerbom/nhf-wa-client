name: Build Release

on:
  push:
    tags:
      - "*"

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists"
          else
            gh release create "${{ github.ref_name }}" \
              --draft \
              --title "NHF Addon Manager ${{ github.ref_name }}" \
              --notes "See the assets to download this version and install."
          fi

  build:
    needs: create-release
    permissions: write-all
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
            args: ""
          - platform: "ubuntu-24.04"
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: install dependencies (ubuntu only)
        if: startsWith(matrix.platform, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLIC_EXTERNAL_API_HOST: ${{ secrets.PUBLIC_EXTERNAL_API_HOST }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: __VERSION__
          releaseName: "NHF Addon Manager __VERSION__"
          releaseBody: "See the assets to download this version and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Strip bundled GPU libs from AppImage
        if: startsWith(matrix.platform, 'ubuntu')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          bundle_dir="src-tauri/target/release/bundle/appimage"
          appimage="$(find "$bundle_dir" -maxdepth 1 -name '*.AppImage' -type f -print -quit 2>/dev/null || true)"
          if [ -z "$appimage" ]; then
            echo "::warning::No AppImage at $bundle_dir; skipping GPU lib strip"
            exit 0
          fi

          chmod +x scripts/strip-appimage-gpu-libs.sh
          scripts/strip-appimage-gpu-libs.sh "$appimage"

          npx --yes @tauri-apps/cli@^2 signer sign \
            --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
            --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$appimage"

          gh release upload "${{ github.ref_name }}" "$appimage" "$appimage.sig" --clobber
          echo "Re-uploaded $(basename "$appimage") (GPU-lib-free) with regenerated signature"

  build-arch:
    needs: create-release
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel
    steps:
      - name: Install Arch system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            rust cargo binutils webkit2gtk-4.1 gtk3 \
            libayatana-appindicator \
            nodejs npm git github-cli

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create builder user for makepkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build Arch package
        shell: bash
        env:
          PUBLIC_EXTERNAL_API_HOST: ${{ secrets.PUBLIC_EXTERNAL_API_HOST }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Building Arch package for version $VERSION"

          TARBALL="/tmp/nhf-addon-manager-${VERSION}.tar.gz"
          tar -czf "$TARBALL" \
            --exclude='node_modules' --exclude='.git' --exclude='target' \
            --exclude='pkg/arch/pkg' --exclude='pkg/arch/src' \
            --exclude='pkg/arch/*.pkg.tar.zst' --exclude='pkg/arch/*.tar.gz' \
            --transform "s,^,nhf-addon-manager-${VERSION}/," .

          cd pkg/arch
          cp "$TARBALL" .
          sed -i "s/^pkgver=.*/pkgver=${VERSION}/" PKGBUILD
          sed -i "s|source=.*|source=(\"nhf-addon-manager-${VERSION}.tar.gz\")|" PKGBUILD

          chown -R builder:builder .
          su builder -c "PUBLIC_EXTERNAL_API_HOST='${PUBLIC_EXTERNAL_API_HOST}' makepkg -s --noconfirm"

      - name: Upload Arch package to release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd pkg/arch
          pkg_file="$(ls *.pkg.tar.zst | head -n 1)"
          gh release upload "${{ github.ref_name }}" "$pkg_file" --clobber --repo "${{ github.repository }}"
